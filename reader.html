<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Dark PDF</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Drop Zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".pdf" hidden>
    <div class="drop-content">
      <svg class="drop-icon" viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <p class="drop-title">Drop a PDF here</p>
      <p class="drop-subtitle">or click to select a file</p>
    </div>
  </div>

  <!-- Reader -->
  <div id="reader" hidden>
    <header id="toolbar">
      <div class="toolbar-left">
        <button id="btn-file" title="Open another file" aria-label="Open another file">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
        </button>
      </div>

      <nav class="toolbar-center">
        <button id="btn-prev" title="Previous page" aria-label="Previous page" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span id="page-info" aria-live="polite">1 / 1</span>
        <button id="btn-next" title="Next page" aria-label="Next page" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </nav>

      <div class="toolbar-right">
        <button id="btn-export" title="Export dark PDF" aria-label="Export dark PDF">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button id="btn-toggle" class="toggle-active" title="Toggle original view for this page" aria-label="Toggle dark mode">
          <svg id="icon-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="icon-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="viewport">
      <!-- Page containers are created dynamically by app.js -->
    </main>

    <div id="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <div id="export-progress" hidden>
      <div class="export-progress-bar">
        <div class="export-progress-fill"></div>
      </div>
      <span class="export-progress-text"></span>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
