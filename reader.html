<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>veil</title>
  <meta name="theme-color" content="#0a0806">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Drop Zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".pdf" class="sr-only">

    <a href="index.html" class="drop-about">What is veil?</a>

    <div class="drop-hero">
      <!-- Double-layer wordmark: ghost v behind the real v -->
      <div class="drop-wordmark" aria-label="veil">
        <span class="drop-v-ghost" aria-hidden="true">v</span>
        <span class="drop-v">v</span><span class="drop-eil">eil</span>
      </div>
      <p class="drop-tagline drop-tagline-desktop">Drop a PDF, protect your eyes</p>
      <label for="file-input" class="drop-browse-btn">Browse PDF</label>
    </div>

    <p class="drop-hint">or click anywhere to browse</p>

    <!-- Veil layers — slide apart when a PDF loads, like curtains parting.
         Three layers at different speeds create parallax depth. -->
    <div class="veil-layer veil-layer-1" aria-hidden="true"></div>
    <div class="veil-layer veil-layer-2" aria-hidden="true"></div>
    <div class="veil-layer veil-layer-3" aria-hidden="true"></div>
  </div>

  <!-- Reader -->
  <div id="reader" hidden>
    <header id="toolbar">
      <a href="reader.html" class="toolbar-logo" title="Open another file">
        <span class="nav-wordmark" aria-label="veil">
          <span class="nav-v-ghost" aria-hidden="true">v</span>
          <span class="nav-v">v</span><span class="nav-eil">eil</span>
        </span>
      </a>

      <div class="toolbar-divider toolbar-filename-divider"></div>

      <span id="file-name" class="toolbar-filename"></span>

      <div class="toolbar-divider toolbar-filename-divider"></div>

      <nav class="toolbar-nav">
        <button id="btn-prev" title="Previous page" aria-label="Previous page" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span id="page-info" aria-live="polite">1 / 1</span>
        <button id="btn-next" title="Next page" aria-label="Next page" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </nav>

      <div class="toolbar-divider"></div>

      <button id="btn-toggle" class="toggle-active" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="icon-dark" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-light" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <button id="btn-export" title="Export dark PDF" aria-label="Export dark PDF">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>

    </header>

    <main id="viewport">
      <!-- Page containers are created dynamically by app.js -->
    </main>

    <div id="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <div id="info-banner" hidden>
      <span id="info-message"></span>
    </div>

    <div id="ios-export-warn" hidden>
      <span id="ios-export-warn-text"></span>
      <div class="ios-export-warn-actions">
        <button id="ios-export-try">Try anyway</button>
        <button id="ios-export-cancel">Cancel</button>
      </div>
    </div>

    <div id="export-progress" hidden>
      <div class="export-progress-bar">
        <div class="export-progress-fill"></div>
      </div>
      <span class="export-progress-text"></span>
      <button id="export-cancel" aria-label="Cancel export">&times;</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
