<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>veil</title>
  <meta name="theme-color" content="#110e0b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Drop Zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".pdf" hidden>
    <div class="drop-content">
      <svg class="drop-icon" viewBox="0 0 48 48" width="56" height="56" fill="none" aria-hidden="true">
        <rect x="8" y="4" width="32" height="40" rx="4" fill="#3d2f25" stroke="#D4A373" stroke-width="1.5" opacity="0.6"/>
        <path d="M8 12 C8 12, 16 8, 24 14 C32 20, 40 10, 40 10 L40 16 C40 16, 32 24, 24 18 C16 12, 8 20, 8 20 Z" fill="#D4A373" opacity="0.35"/>
        <path d="M8 32 C8 32, 16 28, 24 34 C32 40, 40 30, 40 30 L40 36 C40 36, 32 44, 24 38 C16 32, 8 40, 8 40 Z" fill="#D4A373" opacity="0.35"/>
        <rect x="16" y="18" width="16" height="12" rx="2" fill="#D4A373" opacity="0.15" stroke="#D4A373" stroke-width="1" stroke-dasharray="2 2"/>
        <path d="M19 27 L23 22 L25.5 24.5 L28 21 L31 27 Z" fill="#D4A373" opacity="0.5"/>
        <circle cx="21" cy="21.5" r="1.5" fill="#D4A373" opacity="0.5"/>
      </svg>
      <p class="drop-title">Drop a PDF anywhere</p>
      <p class="drop-subtitle">or click to browse</p>
    </div>
  </div>

  <!-- Reader -->
  <div id="reader" hidden>
    <header id="toolbar">
      <a href="index.html" class="toolbar-logo" title="Back to home">
        <svg width="16" height="16" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect x="8" y="4" width="32" height="40" rx="4" fill="#3d2f25" stroke="#D4A373" stroke-width="1.5" opacity="0.6"/>
          <path d="M8 12 C8 12, 16 8, 24 14 C32 20, 40 10, 40 10 L40 16 C40 16, 32 24, 24 18 C16 12, 8 20, 8 20 Z" fill="#D4A373" opacity="0.35"/>
          <path d="M8 32 C8 32, 16 28, 24 34 C32 40, 40 30, 40 30 L40 36 C40 36, 32 44, 24 38 C16 32, 8 40, 8 40 Z" fill="#D4A373" opacity="0.35"/>
        </svg>
        <span>veil</span>
      </a>

      <div class="toolbar-divider"></div>

      <span id="file-name" class="toolbar-filename"></span>

      <div class="toolbar-divider"></div>

      <nav class="toolbar-nav">
        <button id="btn-prev" title="Previous page" aria-label="Previous page" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span id="page-info" aria-live="polite">1 / 1</span>
        <button id="btn-next" title="Next page" aria-label="Next page" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </nav>

      <div class="toolbar-divider"></div>

      <button id="btn-toggle" class="toggle-active" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="icon-dark" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-light" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <button id="btn-export" title="Export dark PDF" aria-label="Export dark PDF">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>

      <button id="btn-file" title="Open another file" aria-label="Open another file">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
          <polyline points="13 2 13 9 20 9"/>
        </svg>
      </button>
    </header>

    <main id="viewport">
      <!-- Page containers are created dynamically by app.js -->
    </main>

    <div id="error-banner" hidden>
      <span id="error-message"></span>
      <button id="error-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <div id="export-progress" hidden>
      <div class="export-progress-bar">
        <div class="export-progress-fill"></div>
      </div>
      <span class="export-progress-text"></span>
      <button id="export-cancel" aria-label="Cancel export">&times;</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
